server {
    listen 80 default_server;
    server_name _;

    # [기본 설정] 헤더 크기 및 언더스코어 허용
    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;
    underscores_in_headers on;
    client_max_body_size 50M;

    # Railway 내부 도메인 해석용 DNS
    resolver 8.8.8.8 valid=30s;

    # 헬스체크
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # =========================================================
    # [1] Parsing Backend (/parsing)
    # 원본 의도: /parsing 경로는 파싱 서버로 보낸다.
    # =========================================================
    location /parsing {
        proxy_pass https://pjt-parsing-2-production.up.railway.app;
        return 301 /parsing/;
    }

    location /parsing/ {
        # CORS 설정
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;

        # 프록시 설정
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSL 핸드쉐이크 (Railway 간 통신)
        proxy_ssl_server_name on;
        proxy_ssl_name pjt-parsing-2-production.up.railway.app;
        proxy_ssl_verify off;

        # 경로 재작성 (원본 로직 유지)
        rewrite ^/parsing/?(.*)$ /$1 break;
        proxy_pass https://pjt-parsing-2-production.up.railway.app;
    }

    # =========================================================
    # [2] Main Backend (/main)
    # 원본 의도: /main 경로는 메인 서버로 보낸다.
    # =========================================================
    location /main {
        proxy_pass https://cutline-main-production.up.railway.app;
        return 301 /main/;
    }

    location /main/ {
        # CORS (위와 동일)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;
        proxy_ssl_name cutline-main-production.up.railway.app;
        proxy_ssl_verify off;
        proxy_set_header Origin "";

        # 경로 재작성 (원본 로직 유지)
        rewrite ^/main/?(.*)$ /$1 break;
        proxy_pass https://cutline-main-production.up.railway.app;
    }

    # =========================================================
    # [3] API Routes (/api) -> Main Backend
    # 원본 의도: /api/... 로 들어오면 /api를 떼고 메인 서버로 보낸다.
    # =========================================================
    location /api/ {
        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;
        proxy_ssl_name cutline-main-production.up.railway.app;
        proxy_ssl_verify off;
        proxy_set_header Origin "";

        # 쿠키 도메인/경로 수정 (Main 서버용)
        proxy_cookie_domain cutline-main-production.up.railway.app $host;
        proxy_cookie_path / "/; SameSite=None; Secure";

        # [중요] 경로 재작성: /api/users -> /users 로 변경해서 백엔드 전달
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass https://cutline-main-production.up.railway.app;
    }

    # =========================================================
    # [4] Direct Routes & Auth -> Main Backend
    # =========================================================
    # [수정] ping, health 키워드 추가 (백엔드 헬스체크용)
    location ~ ^/(oauth2|login|auth|me|users|people|persons|profile|ping|health|[0-9]+)(/|$) {
        
        # CORS: Preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }

        # CORS: Actual Request
        add_header 'Access-Control-Allow-Origin' 'https://cutline-zeta.vercel.app' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept' always;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_ssl_server_name on;
        proxy_ssl_name cutline-main-production.up.railway.app;
        proxy_ssl_verify off;
        proxy_set_header Origin "";

        proxy_cookie_domain cutline-main-production.up.railway.app $host;
        proxy_cookie_path / "/; SameSite=None; Secure";

        proxy_pass https://cutline-main-production.up.railway.app;
    }

    # =========================================================
    # [5] Frontend Redirect (Root)
    # 원본과 다름: 원본은 정적 파일 서빙, 여기선 Vercel로 리다이렉트
    # =========================================================
    location / {
        return 301 https://cutline-zeta.vercel.app/;
    }
}