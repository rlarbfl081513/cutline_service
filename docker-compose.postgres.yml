version: "3.8"

services:
  # 서비스 이름을 postgres로 변경
  postgres:
    # PostgreSQL 공식 이미지를 사용 (버전은 필요에 따라 변경 가능)
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      # ROOT 비밀번호 대신 Superuser 비밀번호 설정
      # 초기 생성할 DB 이름 (Supabase와 동일하게 설정하는 것이 좋습니다)
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER}
    # PostgreSQL의 기본 포트 5432를 사용
    ports:
      - "5432:5432"
    volumes:
      # 볼륨 이름도 postgres-data로 변경
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cutline-network

volumes:
  postgres-data:

networks:
  cutline-network:
    external: true